<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Adventus | Web App Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
</head>
<body>

    <nav class="navbar-adventus py-2">
        <div class="container d-flex justify-content-between align-items-center">
            <img src="assets/img/logo-radioadventus.png" 
                 height="45" onclick="router('inicio')" style="cursor:pointer" alt="Logo">
            <button class="btn btn-link nav-link-custom border-0" onclick="toggleTheme()" id="themeBtn">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
            <div class="d-none d-lg-flex">
                <span class="nav-link-custom" onclick="router('inicio')">Início</span>
                <span class="nav-link-custom" onclick="router('sobre')">Sobre</span>
                <span class="nav-link-custom" onclick="router('curso')">Cursos Bíblicos</span>
                <span class="nav-link-custom" onclick="router('pedidos')">Oração</span>
                <span class="nav-link-custom" onclick="router('agenda')">Agenda</span>
                <span class="nav-link-custom" onclick="router('podcast')">Podcasts</span>
                <span class="nav-link-custom" onclick="router('apoio')">Apoiar</span>
                <span class="nav-link-custom" onclick="router('contato')">Contato</span>
            </div>
        </div>

    </nav>

    <main id="app" class="container mt-4">
    </main>

    <footer class="player-bar">
        <div class="container d-flex align-items-center">
            <button class="play-btn me-3" onclick="toggleAudio()">
                <i class="bi bi-play-fill" id="playIcon"></i>
            </button>
            <div class="flex-grow-1">
                <small class="prog-badge fw-bold text-uppercase" style="color:var(--laranja)">No Ar Agora</small>
                <div id="playerProgTitle" class="fw-bold" style="font-size: 1.1rem;">Carregando...</div>
                            <div class="ms-3 d-none d-lg-flex align-items-center" style="width: 120px;">
                <i class="bi bi-volume-up me-2"></i>
                <input type="range" class="form-range" id="volumeControl" min="0" max="1" step="0.1" value="1">
            </div>
            </div>

            <div class="ms-auto d-none d-md-block">
                <p class="mb-0">93.9 FM</p>
                <span class="badge bg-danger">AO VIVO</span>
                <div class="ms-1 spinner-grow text-danger spinner-grow-sm" role="status"></div>
            </div>
        </div>
    </footer>

    <audio id="radioAudio" src="https://stream.zeno.fm/kxu1vjyliqguv"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
