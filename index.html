<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Adventus | Web App Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-adventus py-2">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="router('inicio')">
            <img src="assets/img/logo-radioadventus.png" height="45" alt="Logo">
        </a>

        <div class="d-flex align-items-center ms-auto me-2 order-lg-2">
            <button class="btn btn-link nav-link-custom border-0" onclick="toggleTheme()" id="themeBtn">
                <i class="bi bi-moon-stars-fill"></i>
            </button>
        </div>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="bi bi-list fs-1 text-azul-escuro" id="menuIcon"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto text-center">
                <span class="nav-link nav-link-custom" onclick="router('inicio')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Início</span>
                <span class="nav-link nav-link-custom" onclick="router('sobre')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Sobre</span>
                <span class="nav-link nav-link-custom" onclick="router('curso')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Cursos</span>
                <span class="nav-link nav-link-custom" onclick="router('pedidos')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Oração</span>
                <span class="nav-link nav-link-custom" onclick="router('agenda')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Agenda</span>
                <span class="nav-link nav-link-custom" onclick="router('podcast')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Podcasts</span>
                <span class="nav-link nav-link-custom" onclick="router('apoio')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Apoiar</span>
                <span class="nav-link nav-link-custom" onclick="router('contato')" data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">Contato</span>
            </div>
        </div>
    </div>
</nav>

    <main id="app" class="container mt-4">
    </main>

    <footer class="player-bar">
        <div class="container d-flex align-items-center">
            <button class="play-btn me-3" onclick="toggleAudio()">
                <i class="bi bi-play-fill" id="playIcon"></i>
            </button>
            <div class="flex-grow-1">
                <small class="prog-badge fw-bold text-uppercase" style="color:var(--laranja)">No Ar Agora</small>
                <div id="playerProgTitle" class="fw-bold" style="font-size: 1.1rem;">Carregando...</div>
                            <div class="ms-3 d-none d-lg-flex align-items-center" style="width: 120px;">
                <i class="bi bi-volume-up me-2"></i>
                <input type="range" class="form-range" id="volumeControl" min="0" max="1" step="0.1" value="1">
            </div>
            </div>

            <div class="ms-auto d-none d-md-block">
                <p class="mb-0">93.9 FM</p>
                <span class="badge bg-danger">AO VIVO</span>
                <div class="ms-1 spinner-grow text-danger spinner-grow-sm" role="status"></div>
            </div>
        </div>
    </footer>

    <audio id="radioAudio" src="https://stream.zeno.fm/kxu1vjyliqguv"></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
